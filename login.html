<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login - Idaptiq</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    .logo {
      max-width: 200px;
      height: auto;
      margin-bottom: 30px;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 400px;
    }

    .login-form input {
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .login-form button {
      padding: 14px;
      font-size: 18px;
      font-weight: 600;
      color: white;
      background: linear-gradient(90deg, #f28c28, #6a1b4d);
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .login-form button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <img src="logo.png" alt="Idaptiq Logo" class="logo">

  <form class="login-form" action="/process-login" method="POST">
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

</body>
</html>
