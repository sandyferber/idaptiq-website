<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Idaptiq</title>

  <!-- Makes mobile devices display correctly -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ffffff;
    }

    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .logo {
      max-width: 90%; /* responsive for small screens */
      height: auto;
      margin-bottom: 40px;
    }

    /* Brand gradient text */
    .brand-text {
      font-size: 18px;
      font-weight: 600;
      background: linear-gradient(90deg, #f28c28, #6a1b4d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-top: 24px;
    }

    /* Login button */
    .login-button {
      margin-top: 10px;
      padding: 14px 34px;
      font-size: 18px;
      font-weight: 600;
      color: white;
      background: linear-gradient(90deg, #f28c28, #6a1b4d);
      border: none;
      border-radius: 30px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: opacity 0.2s ease;
    }

    .login-button:hover {
      opacity: 0.9;
    }

    /* Make text links inherit gradient on mobile */
    .brand-text a {
      color: inherit;
      text-decoration: none;
    }

    /* Optional: smaller padding on very small screens */
    @media (max-width: 400px) {
      .login-button {
        padding: 10px 24px;
        font-size: 16px;
      }
      .brand-text {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <img src="logo.png" alt="Idaptiq Logo" class="logo">

    <!-- LOGIN BUTTON -->
    <a href="/login.html" class="login-button">
      Login
    </a>

    <!-- CONTACT EMAIL -->
    <div class="brand-text">
      <a href="mailto:info@idaptiq.com">info@idaptiq.com</a>
    </div>

  </div>

</body>
</html>
